# Optional production reverse proxy for CCTV streaming.
# Put this inside your HTTPS server block and change server_name/SSL parts according to your domain.

location /cctv-proxy/ {
    proxy_pass http://stream.cctv.malangkota.go.id/;
    proxy_set_header Host stream.cctv.malangkota.go.id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
    add_header X-Frame-Options "ALLOWALL" always;
    add_header Content-Security-Policy "frame-ancestors *; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * data: blob:; connect-src * ws: wss: http: https:;" always;
    add_header Access-Control-Allow-Origin "*" always;
}
